name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libwebkit2gtk-4.1-dev \
            build-essential libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
      # externalBin validation: workspace builds need the sidecar (see ci.yml)
      - name: Build daemon sidecar
        run: bash scripts/prepare-sidecar.sh
      - run: cargo test --workspace
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: node --test ../scripts/bump-version.test.mjs
        working-directory: ui
      - run: npx vitest run --maxWorkers=2
        working-directory: ui

  build:
    name: AppImage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version guard
        run: |
          tag="${GITHUB_REF_NAME#v}"
          conf=$(python3 -c "import json;print(json.load(open('ui/src-tauri/tauri.conf.json'))['version'])")
          test "$tag" = "$conf" || { echo "tag v$tag != tauri.conf version $conf"; exit 1; }
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libwebkit2gtk-4.1-dev \
            build-essential libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libfuse2
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - name: Build daemon sidecar
        run: bash scripts/prepare-sidecar.sh
      - name: Build AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build
        working-directory: ui
      # latest.json is the updater feed: installed apps poll
      # releases/latest/download/latest.json and compare versions.
      - name: Generate updater manifest
        run: |
          appimage=$(ls target/release/bundle/appimage/*.AppImage)
          sig=$(cat "$appimage.sig")
          version="${GITHUB_REF_NAME#v}"
          python3 - "$version" "$sig" "$(basename "$appimage")" <<'EOF'
          import json, sys, datetime
          version, sig, asset = sys.argv[1:4]
          manifest = {
              "version": version,
              "notes": f"conduit v{version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z"),
              "platforms": {
                  "linux-x86_64": {
                      "signature": sig,
                      "url": f"https://github.com/${{ github.repository }}/releases/download/v{version}/{asset}",
                  }
              },
          }
          open("latest.json", "w").write(json.dumps(manifest, indent=2))
          EOF
          cat latest.json
      - name: Create draft release with AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          appimage=$(ls target/release/bundle/appimage/*.AppImage)
          gh release create "$GITHUB_REF_NAME" --draft --generate-notes \
            --title "conduit $GITHUB_REF_NAME" "$appimage" "$appimage.sig" latest.json

  publish:
    name: Publish release
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Undraft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
