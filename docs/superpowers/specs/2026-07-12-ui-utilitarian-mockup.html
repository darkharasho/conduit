<!-- Approved utilitarian mockup (Mappings screen), rendered 2026-07-12.
     This file is the visual source of truth for the redesign spec. -->
<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0e1013;color:#b8bfc9;font-family:system-ui,sans-serif;font-size:13px}
  .app{display:grid;grid-template-rows:1fr 26px;height:736px}
  .cols{display:grid;grid-template-columns:216px 1fr;min-height:0}
  .rail{background:#0a0c0e;border-right:1px solid #1c2026;display:flex;flex-direction:column}
  .logo{padding:12px 14px;font-weight:600;color:#e6eaef;font-size:13px;letter-spacing:.02em;border-bottom:1px solid #1c2026}
  .logo small{color:#525a66;font-weight:400;margin-left:6px}
  .nav{padding:8px 6px;border-bottom:1px solid #1c2026}
  .nav a{display:flex;justify-content:space-between;padding:5px 8px;border-radius:4px;color:#8a93a0;font-size:12.5px}
  .nav a.on{background:#161a20;color:#e6eaef}
  .nav a kbd{color:#525a66;font-family:ui-monospace,monospace;font-size:10px}
  .sect{padding:10px 14px 4px;font-size:10px;letter-spacing:.1em;color:#525a66;text-transform:uppercase}
  .prof{margin:0 6px;padding:5px 8px;border-radius:4px;font-size:12.5px;color:#8a93a0;display:flex;flex-direction:column;gap:1px}
  .prof.on{background:#161a20;color:#e6eaef;border-left:2px solid #4db8a8;margin-left:6px;padding-left:6px}
  .prof small{color:#525a66;font-size:10.5px;font-family:ui-monospace,monospace}
  .prof .live{color:#4db8a8}
  .addprof{margin:4px 14px;color:#525a66;font-size:12px}
  .main{display:flex;flex-direction:column;min-width:0}
  .toolbar{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #1c2026}
  .crumb{color:#e6eaef;font-weight:600}
  .crumb small{color:#525a66;font-weight:400;margin-left:8px}
  .tabs{display:flex;gap:1px;margin-left:14px}
  .tab{padding:4px 11px;font-size:12px;color:#8a93a0;border:1px solid #1c2026;background:#0a0c0e}
  .tab:first-child{border-radius:4px 0 0 4px}.tab:last-child{border-radius:0 4px 4px 0}
  .tab.on{background:#161a20;color:#4db8a8;border-color:#2a3138}
  .sp{flex:1}
  .btn{padding:5px 12px;border:1px solid #2a3138;border-radius:4px;color:#8a93a0;font-size:12px;background:#12151a}
  .btn.warn{color:#d9a04d;border-color:#3d3222}
  .content{padding:14px 16px;display:flex;flex-direction:column;gap:12px;overflow:hidden}
  .kb{display:flex;flex-direction:column;gap:3px}
  .row{display:flex;gap:3px}
  .key{height:44px;flex:1;background:#12151a;border:1px solid #22262d;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:default}
  .key span{font-size:11px;color:#c8cfd8;font-weight:500}
  .key i{font-style:normal;font-size:8.5px;color:#525a66;font-family:ui-monospace,monospace}
  .key.map{background:#11201d;border-color:#274f47}
  .key.map i{color:#4db8a8}
  .key.sel{border-color:#4db8a8;box-shadow:inset 0 0 0 1px #4db8a8}
  .w125{flex:1.25}.w15{flex:1.5}.w175{flex:1.75}.w2{flex:2}.w225{flex:2.25}.w275{flex:2.75}.w625{flex:6.25}
  .mouse-row{display:flex;gap:3px;width:38%;margin-top:2px}
  .insp{border:1px solid #1c2026;border-radius:6px;background:#0a0c0e}
  .insp-head{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #1c2026}
  .insp-key{font-family:ui-monospace,monospace;font-size:13px;color:#4db8a8;background:#11201d;border:1px solid #274f47;padding:3px 10px;border-radius:4px}
  .seg{display:flex;gap:1px}
  .seg span{padding:4px 11px;font-size:12px;color:#8a93a0;border:1px solid #1c2026;background:#0e1013}
  .seg span:first-child{border-radius:4px 0 0 4px}.seg span:last-child{border-radius:0 4px 4px 0}
  .seg span.on{background:#161a20;color:#e6eaef;border-color:#2a3138}
  .insp-body{display:flex;gap:22px;padding:10px 12px;align-items:center}
  .fld{display:flex;flex-direction:column;gap:3px}
  .fld label{font-size:10px;color:#525a66;letter-spacing:.08em;text-transform:uppercase}
  .fld .val{font-family:ui-monospace,monospace;font-size:12.5px;color:#e6eaef;background:#12151a;border:1px solid #22262d;border-radius:4px;padding:4px 10px;min-width:90px}
  .fld .val.cap{color:#4db8a8;border-style:dashed}
  .save{margin-left:auto;background:#4db8a8;color:#08211c;font-weight:600;padding:6px 18px;border-radius:4px;font-size:12.5px}
  .toml{font-family:ui-monospace,monospace;font-size:11px;color:#525a66;padding:6px 12px;border-top:1px solid #1c2026}
  .toml b{color:#8a93a0;font-weight:400}
  .status{background:#0a0c0e;border-top:1px solid #1c2026;display:flex;align-items:center;gap:18px;padding:0 14px;font-size:11px;font-family:ui-monospace,monospace;color:#525a66}
  .status .ok{color:#4db8a8}.status .lat{color:#8a93a0}
  .status .right{margin-left:auto;display:flex;gap:18px}
</style></head><body>
<!-- Structure reference: rail (logo/nav+shortcuts/profiles+match-rules) ·
     toolbar (crumb/layer-tabs/suspend) · keyboard (44px caps, action hints,
     mouse row) · inline inspector (key chip/segmented kinds/mono fields/
     capture field/Apply/TOML echo) · 26px mono status bar. -->
</body></html>
